name: AI Digest

on:
  schedule:
    - cron: "10 6 * * *"
    - cron: "10 16 * * *"
  workflow_dispatch:
    inputs:
      slot:
        description: "Какой выпуск запустить"
        required: true
        default: "manual"
        type: choice
        options:
          - manual
          - today
          - morning
          - evening
          - monthly

concurrency:
  group: ai-digest-${{ github.event.schedule || inputs.slot || 'manual' }}
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
      ADMIN_CHAT_ID: ${{ secrets.ADMIN_CHAT_ID }}
      TG_API_ID: ${{ secrets.TG_API_ID }}
      TG_API_HASH: ${{ secrets.TG_API_HASH }}
      TG_PHONE: ${{ secrets.TG_PHONE }}
      TG_SESSION_STRING: ${{ secrets.TG_SESSION_STRING }}
      # Gemini (recommended, free)
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      # OpenRouter (fallback)
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      LLM_BACKEND: ${{ vars.LLM_BACKEND }}
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
      LLM_FALLBACK_MODELS: ${{ vars.LLM_FALLBACK_MODELS }}
      TIMEZONE: ${{ vars.TIMEZONE }}
      MORNING_HOUR: ${{ vars.MORNING_HOUR }}
      EVENING_HOUR: ${{ vars.EVENING_HOUR }}
      INTERACTIVE_BOT: "false"
      DB_PATH: data/digest.db
      MEDIA_DIR: data/media
      PYTHONUTF8: "1"
      MANUAL_DIGEST_URL: ${{ format('https://github.com/{0}/actions/workflows/ai-digest.yml', github.repository) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Choose slot
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            if [[ "${{ github.event.schedule }}" == "10 6 * * *" ]]; then
              echo "DIGEST_SLOT=morning" >> "$GITHUB_ENV"
            else
              echo "DIGEST_SLOT=evening" >> "$GITHUB_ENV"
            fi
          else
            echo "DIGEST_SLOT=${{ inputs.slot }}" >> "$GITHUB_ENV"
          fi

      - name: Apply default vars
        shell: bash
        run: |
          : "${LLM_BACKEND:=gemini}"
          : "${GEMINI_MODEL:=gemini-2.0-flash}"
          : "${OPENROUTER_MODEL:=stepfun/step-3.5-flash:free}"
          : "${LLM_FALLBACK_MODELS:=}"
          : "${TIMEZONE:=Europe/Moscow}"
          : "${MORNING_HOUR:=9}"
          : "${EVENING_HOUR:=19}"
          {
            echo "LLM_BACKEND=$LLM_BACKEND"
            echo "GEMINI_MODEL=$GEMINI_MODEL"
            echo "OPENROUTER_MODEL=$OPENROUTER_MODEL"
            echo "LLM_FALLBACK_MODELS=$LLM_FALLBACK_MODELS"
            echo "TIMEZONE=$TIMEZONE"
            echo "MORNING_HOUR=$MORNING_HOUR"
            echo "EVENING_HOUR=$EVENING_HOUR"
          } >> "$GITHUB_ENV"

      - name: Validate required secrets
        shell: bash
        run: |
          missing=()
          for key in BOT_TOKEN ADMIN_CHAT_ID TG_API_ID TG_API_HASH TG_PHONE TG_SESSION_STRING; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done
          # Check at least one LLM key is set
          if [[ "$LLM_BACKEND" == "gemini" && -z "${GEMINI_API_KEY:-}" ]]; then
            missing+=("GEMINI_API_KEY")
          fi
          if [[ "$LLM_BACKEND" == "openrouter" && -z "${OPENROUTER_API_KEY:-}" ]]; then
            missing+=("OPENROUTER_API_KEY")
          fi
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing GitHub Actions secrets: ${missing[*]}" >&2
            exit 1
          fi

      - name: Run digest
        run: ai-news-digest run-slot --slot "$DIGEST_SLOT"
